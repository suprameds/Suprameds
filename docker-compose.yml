# Full local dev stack: docker compose up --build
services:
  redis:
    image: redis:7-alpine
    container_name: suprameds-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: suprameds-backend
    ports:
      - "9000:9000"
    env_file:
      - apps/backend/.env
    environment:
      # Override REDIS_URL to point to Docker service (not localhost)
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  storefront:
    build:
      context: .
      dockerfile: Dockerfile.storefront
      args:
        VITE_MEDUSA_BACKEND_URL: ${VITE_MEDUSA_BACKEND_URL:-http://localhost:9000}
        VITE_MEDUSA_PUBLISHABLE_KEY: ${VITE_MEDUSA_PUBLISHABLE_KEY:-}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID:-}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-}
        VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY:-}
        VITE_RAZORPAY_KEY_ID: ${VITE_RAZORPAY_KEY_ID:-}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_GSC_VERIFICATION: ${VITE_GSC_VERIFICATION:-}
        VITE_GTM_ID: ${VITE_GTM_ID:-}
        VITE_META_PIXEL_ID: ${VITE_META_PIXEL_ID:-}
        VITE_SITE_URL: ${VITE_SITE_URL:-https://suprameds.in}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
        VITE_MEDUSA_PRODUCTION_URL: ${VITE_MEDUSA_PRODUCTION_URL:-}
        VITE_CAPACITOR: ${VITE_CAPACITOR:-}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-local}
    env_file:
      - .env.storefront
    container_name: suprameds-storefront
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
