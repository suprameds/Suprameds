name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — Check & Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://fake:fake@localhost:5432/fake
      JWT_SECRET: ci-test-secret
      COOKIE_SECRET: ci-test-cookie
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: TypeScript
        run: npx tsc --noEmit
        working-directory: apps/backend
      - name: Unit Tests
        run: npx jest --testMatch="**/*.unit.spec.ts" --ci --passWithNoTests
        working-directory: apps/backend
      - name: Build
        run: pnpm build
        working-directory: apps/backend

  storefront:
    name: Storefront — Check & Build
    runs-on: ubuntu-latest
    env:
      VITE_MEDUSA_BACKEND_URL: http://localhost:9000
      VITE_MEDUSA_PUBLISHABLE_KEY: pk_test_ci
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: TypeScript
        run: npx tsc --noEmit
        working-directory: apps/storefront
      - name: Lint
        run: npx eslint src/ --max-warnings 0
        working-directory: apps/storefront
      - name: Tests
        run: pnpm test
        working-directory: apps/storefront
      - name: Build
        run: pnpm build
        working-directory: apps/storefront

  audit:
    name: Security — Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high

  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend, storefront]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build storefront image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.storefront
          push: false
          build-args: |
            VITE_MEDUSA_BACKEND_URL=https://api.suprameds.in
            VITE_MEDUSA_PUBLISHABLE_KEY=placeholder
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Disabled: require full Medusa boot with migrations ──
  # Re-enable when CI backend setup is stable

  # test-e2e:
  #   name: E2E — Playwright
  # test-security:
  #   name: Security Tests
  # test-a11y:
  #   name: Accessibility Audit
  # test-smoke:
  #   name: Smoke Tests (Production)
